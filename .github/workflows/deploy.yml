name: Deploy AI API

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_arkturian:
        description: 'Deploy to arkturian.com'
        type: boolean
        default: true
      deploy_aiserver:
        description: 'Deploy to aiserver.oneal.eu'
        type: boolean
        default: true

jobs:
  # ============================================================================
  # Build archive (shared by all deployments)
  # ============================================================================
  build-archive:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: deploy-archive
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment archive
        run: |
          echo "📦 Creating deployment archive..."
          tar --warning=no-file-changed --ignore-failed-read -czf deploy.tar.gz \
            --exclude='.git' \
            --exclude='.devops' \
            --exclude='.github' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.venv' \
            --exclude='venv' \
            --exclude='.env' \
            --exclude='*.log' \
            .
          echo "✅ Archive created: $(du -h deploy.tar.gz)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-archive
          path: deploy.tar.gz

  # ============================================================================
  # PRODUCTION: arkturian.com (api-ai.arkturian.com)
  # ============================================================================
  deploy-arkturian:
    name: Deploy to arkturian.com
    needs: build-archive
    if: |
      vars.ENABLE_ARKTURIAN_DEPLOY == 'true' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'workflow_dispatch' || inputs.deploy_arkturian)
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api-ai.arkturian.com

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-archive.outputs.artifact-name }}

      - name: Upload archive to arkturian.com
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "deploy.tar.gz"
          target: "/tmp/"

      - name: Deploy to arkturian.com
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e

            DEPLOY_PATH="/var/www/api-ai.arkturian.com"
            BACKUP_DIR="/var/backups"
            BACKUP_PREFIX="api-ai"
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            BACKUP_PATH="$BACKUP_DIR/${BACKUP_PREFIX}-${TIMESTAMP}"

            echo "🎯 Deploy to: $DEPLOY_PATH"

            if [ -d "$DEPLOY_PATH" ]; then
              echo "💾 Creating backup..."
              mkdir -p "$BACKUP_DIR"
              cp -r "$DEPLOY_PATH" "$BACKUP_PATH"
              echo "✅ Backup created: $BACKUP_PATH"
            fi

            echo "🚀 Deploying Python API..."
            mkdir -p "$DEPLOY_PATH"

            # Extract archive directly to deploy path
            tar -xzf /tmp/deploy.tar.gz -C "$DEPLOY_PATH"
            rm -f /tmp/deploy.tar.gz

            echo "📦 Installing Python dependencies..."
            cd "$DEPLOY_PATH"

            # Use pyenv Python if available
            if [ -f ~/.pyenv/versions/3.11.9/bin/python3.11 ]; then
              rm -rf venv
              ~/.pyenv/versions/3.11.9/bin/python3.11 -m venv venv
              source venv/bin/activate
            fi

            pip install --upgrade pip
            pip install -r requirements.txt

            echo "🔄 Restarting API service..."
            systemctl restart api-ai || echo "⚠️  Service restart may need manual intervention"

            # Robust health check: uvicorn workers take a few seconds to bind
            # after restart. Poll for up to ~30s before giving up.
            echo "🩺 Waiting for /health to come back up..."
            for i in $(seq 1 15); do
              if curl -fsS --max-time 5 http://127.0.0.1:8000/health > /dev/null 2>&1; then
                echo "✅ Healthy after ${i} attempt(s)"
                break
              fi
              if [ "$i" -eq 15 ]; then
                echo "❌ Service did not come up within 30s"
                systemctl status api-ai --no-pager | tail -20 || true
                exit 1
              fi
              sleep 2
            done

            echo "✅ Deployment completed successfully!"

  # ============================================================================
  # PDREI: pdrei.arkturian.com (jascha) — own instance
  # ============================================================================
  deploy-pdrei:
    name: Deploy to pdrei.arkturian.com
    needs: build-archive
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment:
      name: pdrei
      url: https://api-ai.pdrei.arkturian.com

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-archive.outputs.artifact-name }}

      - name: Upload archive to pdrei
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PDREI_DEPLOY_HOST }}
          username: ${{ secrets.PDREI_DEPLOY_USER }}
          key: ${{ secrets.PDREI_DEPLOY_SSH_KEY }}
          port: 22
          source: "deploy.tar.gz"
          target: "/tmp/"

      - name: Deploy to pdrei
        uses: appleboy/ssh-action@v1.0.3
        env:
          API_AI_ENV_CONTENT: ${{ secrets.PDREI_API_AI_ENV }}
        with:
          host: ${{ secrets.PDREI_DEPLOY_HOST }}
          username: ${{ secrets.PDREI_DEPLOY_USER }}
          key: ${{ secrets.PDREI_DEPLOY_SSH_KEY }}
          port: 22
          envs: API_AI_ENV_CONTENT
          command_timeout: 15m
          script: |
            set -e

            DEPLOY_PATH="/var/www/api-ai"
            DATA_DIR="/var/lib/api-ai"
            SERVICE_NAME="api-ai"
            DOMAIN="api-ai.pdrei.arkturian.com"
            UPSTREAM_PORT=8025

            sudo mkdir -p "$DATA_DIR"
            sudo chown -R jascha:jascha "$DATA_DIR" "$DEPLOY_PATH"

            echo "🚀 Extracting archive..."
            cd "$DEPLOY_PATH"
            tar -xzf /tmp/deploy.tar.gz -C "$DEPLOY_PATH"
            rm -f /tmp/deploy.tar.gz

            # Write .env from secret (overrides prod values for pdrei)
            echo "📝 Writing .env (with pdrei overrides)..."
            cat > "$DEPLOY_PATH/.env" <<ENVEOF
            $API_AI_ENV_CONTENT
            ENVEOF
            # Override storage URL + port for pdrei
            sed -i 's|^STORAGE_API_URL=.*|STORAGE_API_URL=https://storage-api.pdrei.arkturian.com|' "$DEPLOY_PATH/.env"
            sed -i 's|^PORT=.*|PORT=8025|' "$DEPLOY_PATH/.env"
            sed -i 's|^COST_TRACKER_DATA_DIR=.*|COST_TRACKER_DATA_DIR=/var/lib/api-ai|' "$DEPLOY_PATH/.env"
            chmod 600 "$DEPLOY_PATH/.env"

            # Setup venv
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install --upgrade pip --quiet
            pip install --no-cache-dir -r requirements.txt 2>&1 | tail -3

            # Always (re)write systemd unit
            echo "Writing systemd unit..."
            sudo tee /etc/systemd/system/${SERVICE_NAME}.service > /dev/null <<UNIT
            [Unit]
            Description=AI API (pdrei instance)
            After=network.target

            [Service]
            Type=simple
            User=jascha
            WorkingDirectory=${DEPLOY_PATH}
            EnvironmentFile=${DEPLOY_PATH}/.env
            ExecStart=${DEPLOY_PATH}/venv/bin/uvicorn main:app --host 127.0.0.1 --port ${UPSTREAM_PORT}
            Restart=on-failure
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            UNIT
            sudo systemctl daemon-reload
            sudo systemctl enable ${SERVICE_NAME}

            # Always (re)write nginx vhost with SSL
            echo "Writing nginx vhost..."
            CERT_PATH="/etc/letsencrypt/live/mcp.pdrei.arkturian.com"
            if ! sudo test -d "$CERT_PATH"; then
              echo "ERROR: SSL cert not found at $CERT_PATH"
              exit 1
            fi

            sudo tee /etc/nginx/sites-available/${DOMAIN} > /dev/null <<NGINX
            server {
                listen 80;
                server_name ${DOMAIN};
                return 301 https://\$host\$request_uri;
            }

            server {
                listen 443 ssl http2;
                server_name ${DOMAIN};

                ssl_certificate ${CERT_PATH}/fullchain.pem;
                ssl_certificate_key ${CERT_PATH}/privkey.pem;
                include /etc/letsencrypt/options-ssl-nginx.conf;
                ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

                client_max_body_size 100M;
                proxy_request_buffering off;

                location / {
                    proxy_pass http://127.0.0.1:${UPSTREAM_PORT};
                    proxy_http_version 1.1;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                    proxy_read_timeout 600s;
                    proxy_buffering off;
                }
            }
            NGINX
            sudo ln -sf /etc/nginx/sites-available/${DOMAIN} /etc/nginx/sites-enabled/${DOMAIN}
            sudo nginx -t && sudo systemctl reload nginx

            # Restart and verify with retry — uvicorn workers need a few
            # seconds to bind after restart.
            sudo systemctl restart ${SERVICE_NAME}
            echo "🩺 Waiting for /health to come back up..."
            healthy=false
            for i in $(seq 1 15); do
              if curl -sf --max-time 5 http://localhost:${UPSTREAM_PORT}/health > /dev/null 2>&1; then
                echo "✅ Healthy after ${i} attempt(s)"
                curl -s http://localhost:${UPSTREAM_PORT}/health
                echo
                healthy=true
                break
              fi
              sleep 2
            done
            if [ "$healthy" != "true" ]; then
              echo "⚠️ Local health check failed after 30s"
              sudo systemctl status ${SERVICE_NAME} --no-pager
              sudo journalctl -u ${SERVICE_NAME} -n 50 --no-pager
              exit 1
            fi

            if curl -sf https://${DOMAIN}/health > /dev/null; then
              echo "✅ HTTPS endpoint reachable"
            fi

  # ============================================================================
  # O'NEAL: aiserver.oneal.eu (via arkturian.com jump host)
  # ============================================================================
  deploy-aiserver:
    name: Deploy to aiserver.oneal.eu
    needs: build-archive
    if: |
      vars.ENABLE_AISERVER_DEPLOY == 'true' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'workflow_dispatch' || inputs.deploy_aiserver)
    runs-on: ubuntu-latest
    environment:
      name: oneal
      url: https://gsgbot.arkturian.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via arkturian.com jump host
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            echo "=== Deploying api-ai to aiserver.oneal.eu via jump host ==="

            # SSH to aiserver and deploy via git
            ssh -o StrictHostKeyChecking=no -i ~/.ssh/oneal_aiserver gsgbot@aiserver.oneal.eu << 'DEPLOY_SCRIPT'
            set -euo pipefail

            DEPLOY_PATH="/var/code/api-ai"

            echo "=== Updating repository ==="
            cd "$DEPLOY_PATH"
            git fetch origin
            git clean -fd --exclude=venv --exclude=.env
            git checkout -f main
            git reset --hard origin/main

            echo "=== Installing dependencies ==="
            source venv/bin/activate
            pip install --upgrade pip
            pip install --no-cache-dir -r requirements.txt

            echo "=== Restarting service ==="
            sudo systemctl restart api-ai.service

            echo "=== Health check (with retry) ==="
            for i in $(seq 1 15); do
              if curl -fsS --max-time 5 http://127.0.0.1:8003/health > /dev/null 2>&1; then
                echo "✅ Healthy after ${i} attempt(s)"
                curl -s http://127.0.0.1:8003/health
                echo
                break
              fi
              if [ "$i" -eq 15 ]; then
                echo "❌ Service did not come up within 30s"
                sudo systemctl status api-ai.service --no-pager | tail -20 || true
                exit 1
              fi
              sleep 2
            done
            echo "=== Deployment complete ==="
            DEPLOY_SCRIPT

  # ============================================================================
  # SDK Regeneration (after all deployments)
  # ============================================================================
  trigger-sdk-regeneration:
    name: Trigger SDK Regeneration
    needs: [deploy-arkturian, deploy-aiserver]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      (needs.deploy-arkturian.result == 'success' || needs.deploy-aiserver.result == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Trigger TypeScript SDK regeneration
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: apopovic77/api-ai-typescript-sdk
          event-type: openapi-updated

      - name: Trigger C# SDK regeneration
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: apopovic77/api-ai-csharp-sdk
          event-type: openapi-updated
